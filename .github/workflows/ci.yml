name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run tests
        id: run_tests
        run: npm test
        continue-on-error: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Publish test summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Tests
          path: test-results/*.xml
          reporter: java-junit

      - name: Post PR comment with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outcome = '${{ steps.run_tests.outcome }}';
            const passed = outcome === 'success';
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'All tests passed — ready to merge' : 'Tests failed — merge is blocked';

            let xml = '';
            try { xml = fs.readFileSync('test-results/results.xml', 'utf8'); } catch(e) {}

            const suiteMatches = [...xml.matchAll(/tests="(\d+)" failures="(\d+)" skipped="(\d+)"/g)];
            let total = 0, failed = 0, skipped = 0;
            suiteMatches.forEach(m => {
              total += parseInt(m[1]);
              failed += parseInt(m[2]);
              skipped += parseInt(m[3]);
            });
            const passedCount = total - failed - skipped;
            const hasResults = total > 0;
            const statsTable = hasResults ? [
              '| Result | Count |',
              '|--------|-------|',
              `| ✅ Passed | ${passedCount} |`,
              `| ❌ Failed | ${failed} |`,
              `| ⏭️ Skipped | ${skipped} |`,
              `| 📋 Total | ${total} |`,
            ].join('\n') : '_No test results found — build may have failed before tests ran._';

            const body = [
              `## ${icon} Playwright Test Results`,
              '',
              `**${status}**`,
              '',
              statsTable,
              '',
              `> 📄 Full HTML report: [Actions artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('Playwright Test Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
