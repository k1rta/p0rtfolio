name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  checks: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Clean previous test results
        run: rm -rf test-results/ playwright-report/
        if: always()

      - name: Run tests
        id: run_tests
        run: npm test
        continue-on-error: true

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Publish report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: reports/${{ github.run_id }}
          keep_files: true

      - name: Create latest report redirect
        if: always()
        run: |
          mkdir -p gh-pages-root
          cat > gh-pages-root/index.html << EOF
          <!DOCTYPE html>
          <meta http-equiv="refresh" content="0; url=reports/${{ github.run_id }}/">
          <a href="reports/${{ github.run_id }}/">View latest test report →</a>
          EOF

      - name: Publish redirect to GitHub Pages root
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-root
          keep_files: true

      - name: Post PR comment with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const fs = require('fs');
            const outcome = '${{ steps.run_tests.outcome }}';
            const passed = outcome === 'success';
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'All tests passed — ready to merge' : 'Tests failed — merge is blocked';
            const reportUrl = `https://k1rta.github.io/p0rtfolio/reports/${{ github.run_id }}/`;

            let xml = '';
            try { xml = fs.readFileSync('test-results/results.xml', 'utf8'); } catch(e) {}

            const rootMatch = xml.match(/<testsuites[^>]*tests="(\d+)"[^>]*failures="(\d+)"[^>]*skipped="(\d+)"/s);
            const total    = rootMatch ? parseInt(rootMatch[1]) : 0;
            const failed   = rootMatch ? parseInt(rootMatch[2]) : 0;
            const skipped  = rootMatch ? parseInt(rootMatch[3]) : 0;
            const passedCount = total - failed - skipped;
            const hasResults = total > 0;
            const statsTable = hasResults ? [
              '| Result | Count |',
              '|--------|-------|',
              `| ✅ Passed | ${passedCount} |`,
              `| ❌ Failed | ${failed} |`,
              `| ⏭️ Skipped | ${skipped} |`,
              `| 📋 Total | ${total} |`,
            ].join('\n') : '_No test results found — build may have failed before tests ran._';

            const body = [
              `## ${icon} Playwright Test Results`,
              '',
              `**${status}**`,
              '',
              statsTable,
              '',
              `> 📄 [View full HTML report →](${reportUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('Playwright Test Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
